name: 🔄 화성시 산불 데이터 자동 업데이트 (일별)

on:
  schedule:
    - cron: "0 21 * * *"   # 매일 오전 06:00 KST (UTC 21:00 전날)
  workflow_dispatch:         # 수동 실행 가능

permissions:
  contents: write            # JSON 파일 자동 commit·push 권한

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔧 의존성 설치
        run: pip install -r requirements.txt

      # ── 데이터 수집 ──────────────────────────────────────────
      - name: 🌤️ 기상청 초단기실황 수집
        run: python crawling/fetch_weather.py

      - name: 🔥 산림청 산불위험예보 수집
        run: python crawling/fetch_forest_risk.py

      - name: 🌥️ 기상청 중기예보 수집 (10일)
        run: python crawling/fetch_mid_weather.py

      - name: 🌲 산림청 산불 이력 수집 (24시간 캐시 적용)
        continue-on-error: true
        timeout-minutes: 5
        run: |
          python crawling/fetch_fire_data.py || {
            echo "⚠️  산림청 수집 실패 — 기존 fire_history.json 유지"
            exit 0
          }

      - name: 🗺️ OpenStreetMap 도로 데이터 수집
        continue-on-error: true
        timeout-minutes: 5
        run: |
          python crawling/fetch_osm_roads.py || {
            echo "⚠️  OSM 수집 실패 — 기존 osm_roads.json 유지"
            exit 0
          }

      # ── AI 예측 · 격자 · 노선 ─────────────────────────────────
      - name: 🤖 AI 산불 위험도 예측 실행 (RF+XGBoost 앙상블)
        run: python scripts/train_predict_hwaseong.py

      - name: 📐 5km 격자 위험도 매핑 (시간대별)
        run: python scripts/build_grid_hwaseong.py

      - name: 🔢 최적 감시요원 인원 수 분석 (엘보우 기법)
        run: python scripts/find_optimal_guards.py

      - name: 🗺️ 최적 순찰 노선 계산
        run: python scripts/optimize_routes.py

      # ── 커밋 & 푸시 ──────────────────────────────────────────
      - name: 📤 변경된 JSON 자동 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            public/data/weather.json \
            public/data/mid_weather.json \
            public/data/forest_risk.json \
            public/data/fire_history.json \
            public/data/fire_history_gyeonggi.json \
            public/data/predicted_risk.json \
            public/data/grid_risk.json \
            public/data/optimal_routes.json \
            public/data/optimal_guard_count.json \
            public/data/best_params.json \
            public/data/forest_roads.json

          CURRENT_TIME=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
          WEATHER_LEVEL=$(python3 -c "
          import json
          d = json.load(open('public/data/weather.json'))
          print(d.get('fire_weather_index', {}).get('label', '알 수 없음'))
          " 2>/dev/null || echo "알 수 없음")
          FOREST_GRADE=$(python3 -c "
          import json, os
          if os.path.exists('public/data/forest_risk.json'):
              d = json.load(open('public/data/forest_risk.json'))
              print(d.get('overall_label', '없음'))
          else:
              print('없음')
          " 2>/dev/null || echo "없음")

          git diff --staged --quiet || (
            git commit -m "🔥 자동 업데이트: ${CURRENT_TIME} · 화재위험 ${WEATHER_LEVEL} · 산불위험예보 ${FOREST_GRADE}"
            git fetch origin main
            git merge origin/main -X ours --no-edit
            git push origin main --force-with-lease
          )
