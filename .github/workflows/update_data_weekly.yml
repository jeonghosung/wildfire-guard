name: 📅 화성시 과거기상 데이터 갱신 (주 1회)

on:
  schedule:
    - cron: "0 20 * * 0"   # 매주 일요일 오전 05:00 KST (UTC 일요일 20:00)
  workflow_dispatch:         # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-weekly:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔧 의존성 설치
        run: pip install -r requirements.txt

      - name: 🗂️ 기상청 과거관측 수집 (수원관측소 · 최근 5년)
        run: python crawling/fetch_historical_weather.py

      - name: 🌐 OpenStreetMap 도로 데이터 수집
        run: python crawling/fetch_osm_roads.py

      - name: 🌲 산림청 산불 이력 수집 (전체 순회 · 주 1회)
        continue-on-error: true
        timeout-minutes: 5
        run: |
          python crawling/fetch_fire_data.py || {
            echo "⚠️  산림청 수집 실패 — 기존 fire_history.json 유지"
            exit 0
          }

      - name: 📤 변경된 JSON 자동 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/data/historical_weather.json \
                  public/data/osm_roads.json \
                  public/data/fire_history.json

          if git diff --staged --quiet; then
            echo "ℹ️ 변경사항 없음 — 커밋 스킵"
            exit 0
          fi

          CURRENT_TIME=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
          git commit -m "📅 주간 데이터 갱신: ${CURRENT_TIME} · 과거기상 + OSM 도로 + 산불이력"
          git push
